# Runs lint+tests on every push/PR; on master also releases the npm package
# via zx-semrel (with npm OIDC trusted publishing) and pushes the radar +
# jsdoc statics to the gh-pages branch via ggcp.
name: CI
on: [push, pull_request]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test

      - name: Upload coverage to Qlty
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: qltysh/qlty-action/coverage@a2277a908db90c4c868832fb9204521fb940fdb4 # v1
        with:
          token: ${{ secrets.QLTY_TOKEN }}
          files: coverage/lcov.info

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      checks: read
      statuses: write
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: npm ci

      - name: Build radar & docs
        run: |
          npm run generate
          npm run docs

      - name: Release npm package
        env:
          GH_USER: 'qiwibot'
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          NPM_OIDC: true
          NPM_PROVENANCE: true
        run: npx zx-semrel

      - name: Push radar & docs to gh-pages
        env:
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          npx ggcp 'dist>**/*' "https://x-access-token:$GH_TOKEN@github.com/$REPO.git/gh-pages" --message='docs: update tech-radar static'
